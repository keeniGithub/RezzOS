# RezzOS Pure Invisible Scrollback Configuration

set -g mode-keys vi
set -g status off
set -g mode-style "bg=black,fg=black"
set -g history-limit 10000
set -g mouse on

# Bind PageUp / Shift+PageUp to start scroll mode
bind-key -n PageUp copy-mode -u
bind-key -n S-PageUp copy-mode -u

# Unbind ALL default copy-mode keybindings
unbind-key -T copy-mode-vi -a

# Scroll UP bindings (move up in history)
bind-key -T copy-mode-vi PageUp send-keys -X page-up
bind-key -T copy-mode-vi Up send-keys -X cursor-up
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up

# Return to active command prompt (exit scroll mode instantly)
bind-key -T copy-mode-vi PageDown send-keys -X cancel
bind-key -T copy-mode-vi S-PageDown send-keys -X cancel
bind-key -T copy-mode-vi Down send-keys -X cancel
bind-key -T copy-mode-vi WheelDownPane send-keys -X cancel
bind-key -T copy-mode-vi Enter send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel
bind-key -T copy-mode-vi Space send-keys -X cancel
bind-key -T copy-mode-vi BSpace send-keys -X cancel
