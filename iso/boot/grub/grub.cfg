set timeout=5
set default=0

loadfont /boot/grub/fonts/unicode.pf2

insmod gfxterm
insmod png
set gfxmode=auto
terminal_output gfxterm

set theme=/boot/grub/themes/rezzos/theme.txt

menuentry "RezzOS - Boot" {
    linux /boot/bzImage console=ttyS0 quiet loglevel=0
    initrd /boot/rootfs.cpio.gz
}

menuentry "RezzOS - Safe Mode" {
    linux /boot/bzImage console=ttyS0 quiet loglevel=0 nomodeset
    initrd /boot/rootfs.cpio.gz
}

menuentry "Reboot" { reboot }
menuentry "Shutdown" { halt }
