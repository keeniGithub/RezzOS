name: Build ISO

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential flex bison libncurses-dev libssl-dev libelf-dev bc cpio gzip wget tar grub-pc-bin xorriso qemu-utils mtools
      
      - name: Build RezzOS
        run: |
          rm -f /tmp/musl-1.2.5-r3.apk
          ./build.sh
      
      - name: Create ISO
        run: |
          mkdir -p iso/boot/grub
          cp bzImage iso/boot/
          cp rootfs.cpio.gz iso/boot/
          cat > iso/boot/grub/grub.cfg << 'GRUB'
          set timeout=5
          menuentry "RezzOS" {
              linux /boot/bzImage console=ttyS0 quiet loglevel=0
              initrd /boot/rootfs.cpio.gz
          }
          GRUB
          grub-mkrescue -o rezzos.iso iso/
          ls -la rezzos.iso
      
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: rezzos-iso
          path: rezzos.iso
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: "RezzOS Build $(date +%Y-%m-%d)"
          tag_name: "build-$(date +%Y%m%d-%H%M)"
          files: rezzos.iso
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
